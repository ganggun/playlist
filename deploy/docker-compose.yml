services:
  playlist-backend:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-ganggun}/playlist-backend:${IMAGE_TAG:-latest}
    container_name: playlist-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 8000
      DATABASE_URL: sqlite:////data/playlist.db
    expose:
      - "8000"
    volumes:
      - playlist-data:/data
    networks:
      - playlist

  playlist-frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-ganggun}/playlist-frontend:${IMAGE_TAG:-latest}
    container_name: playlist-frontend
    restart: unless-stopped
    depends_on:
      - playlist-backend
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-19520}:80"
    networks:
      - playlist

networks:
  playlist:
    name: playlist

volumes:
  playlist-data:
    name: playlist-data
