name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/playlist-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/playlist-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          build-args: |
            EXPO_PUBLIC_API_URL=
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy on home server
        uses: appleboy/ssh-action@v1.2.2
        env:
          APP_DIR: /home/ganggun0113/apps/playlist-request
          APP_HOST_PORT: ${{ secrets.APP_HOST_PORT }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: latest
          PUBLIC_SSL_PORT: ${{ secrets.PUBLIC_SSL_PORT }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          SPOTIFY_ACCESS_TOKEN: ${{ secrets.SPOTIFY_ACCESS_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID || secrets.SPORTIFY_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET || secrets.SPORTIFY_SECRET }}
          SPOTIFY_PLAYLIST_ID: ${{ secrets.SPOTIFY_PLAYLIST_ID }}
          SPOTIFY_REDIRECT_URI: ${{ secrets.SPOTIFY_REDIRECT_URI }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          USE_SPOTIFY_SEARCH: ${{ secrets.USE_SPOTIFY_SEARCH }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: APP_DIR,APP_HOST_PORT,DOCKERHUB_TOKEN,DOCKERHUB_USERNAME,IMAGE_TAG,PUBLIC_SSL_PORT,SERVER_PASSWORD,SPOTIFY_ACCESS_TOKEN,SPOTIFY_CLIENT_ID,SPOTIFY_CLIENT_SECRET,SPOTIFY_PLAYLIST_ID,SPOTIFY_REDIRECT_URI,SPOTIFY_REFRESH_TOKEN,USE_SPOTIFY_SEARCH
          script_stop: true
          script: |
            set -euo pipefail

            APP_HOST_PORT="${APP_HOST_PORT:-19520}"
            PUBLIC_SSL_PORT="${PUBLIC_SSL_PORT:-9520}"
            USE_SPOTIFY_SEARCH="${USE_SPOTIFY_SEARCH:-false}"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            cat > docker-compose.yml <<'COMPOSE'
            services:
              playlist-backend:
                image: ${DOCKERHUB_USERNAME}/playlist-backend:${IMAGE_TAG:-latest}
                container_name: playlist-backend
                restart: unless-stopped
                env_file:
                  - path: .env
                    required: false
                environment:
                  PORT: 8000
                expose:
                  - "8000"
                networks:
                  - playlist

              playlist-frontend:
                image: ${DOCKERHUB_USERNAME}/playlist-frontend:${IMAGE_TAG:-latest}
                container_name: playlist-frontend
                restart: unless-stopped
                depends_on:
                  - playlist-backend
                ports:
                  - "127.0.0.1:${APP_HOST_PORT:-19520}:80"
                networks:
                  - playlist

            networks:
              playlist:
                name: playlist
            COMPOSE

            cat > .env <<ENV
            APP_NAME=Playlist Request Prototype
            APP_HOST_PORT=${APP_HOST_PORT}
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
            IMAGE_TAG=${IMAGE_TAG}
            USE_SPOTIFY_SEARCH=${USE_SPOTIFY_SEARCH}
            SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
            SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
            SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-}
            SPOTIFY_REFRESH_TOKEN=${SPOTIFY_REFRESH_TOKEN:-}
            SPOTIFY_ACCESS_TOKEN=${SPOTIFY_ACCESS_TOKEN:-}
            SPOTIFY_PLAYLIST_ID=${SPOTIFY_PLAYLIST_ID:-}
            SPOTIFY_SCOPE=playlist-modify-public playlist-modify-private
            ENV

            cat > setup-nginx.sh <<'NGINX_SCRIPT'
            #!/usr/bin/env bash
            set -euo pipefail

            DOMAIN="${DOMAIN:-supdobby.me}"
            PUBLIC_SSL_PORT="${PUBLIC_SSL_PORT:-9520}"
            APP_HOST_PORT="${APP_HOST_PORT:-19520}"
            CERT_PATH="${CERT_PATH:-/etc/letsencrypt/live/${DOMAIN}/fullchain.pem}"
            KEY_PATH="${KEY_PATH:-/etc/letsencrypt/live/${DOMAIN}/privkey.pem}"
            SITE_PATH="/etc/nginx/sites-available/playlist-request.conf"

            sudo tee "$SITE_PATH" >/dev/null <<NGINX
            server {
                listen ${PUBLIC_SSL_PORT} ssl;
                server_name ${DOMAIN};

                ssl_certificate ${CERT_PATH};
                ssl_certificate_key ${KEY_PATH};

                location / {
                    proxy_pass http://127.0.0.1:${APP_HOST_PORT};
                    proxy_http_version 1.1;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto https;
                }
            }
            NGINX

            sudo ln -sf "$SITE_PATH" /etc/nginx/sites-enabled/playlist-request.conf
            sudo nginx -t
            sudo systemctl reload nginx

            echo "nginx proxy ready: https://${DOMAIN}:${PUBLIC_SSL_PORT}"
            NGINX_SCRIPT
            chmod +x setup-nginx.sh

            printf '%s' "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps

            if [ -n "${SERVER_PASSWORD:-}" ]; then
              printf '%s\n' "$SERVER_PASSWORD" | sudo -S -v
            fi

            PUBLIC_SSL_PORT="$PUBLIC_SSL_PORT" APP_HOST_PORT="$APP_HOST_PORT" ./setup-nginx.sh
